<!DOCTYPE html>
<html>
<head>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        :root { --bg: #1c1c1d; --text: #fff; --btn: #007aff; --sec: #2c2c2e; --accent: #5ac8fa; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 80px; overflow: hidden; }
        .tab-content { display: none; padding: 15px; height: calc(100vh - 80px); overflow-y: auto; box-sizing: border-box; }
        .active { display: block; }
        
        /* Навигация */
        .nav { position: fixed; bottom: 0; width: 100%; background: var(--sec); display: flex; height: 70px; border-top: 0.5px solid #333; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 10px; opacity: 0.5; }
        .nav-item.active-nav { opacity: 1; color: var(--btn); }
        .nav-item b { font-size: 20px; margin-bottom: 2px; }

        /* Карточки */
        .card { background: var(--sec); border-radius: 16px; padding: 15px; margin-bottom: 15px; }
        .fact-img { width: 100%; height: 200px; border-radius: 12px; object-fit: cover; background: #333; }
        button { background: var(--btn); color: #fff; border: none; padding: 12px; border-radius: 10px; font-weight: bold; width: 100%; cursor: pointer; }
        input { width: 100%; padding: 12px; border-radius: 10px; border: none; background: #3d3d42; color: #fff; box-sizing: border-box; }

        /* ИИ Чат */
        #chat-area { height: 60%; overflow-y: auto; margin-bottom: 10px; display: flex; flex-direction: column; gap: 10px; }
        .m { padding: 10px; border-radius: 12px; max-width: 85%; line-height: 1.4; font-size: 14px; }
        .ai { background: #3a3a3c; align-self: flex-start; color: var(--accent); }
        .user { background: var(--btn); align-self: flex-end; }

        /* Игры */
        .game-win { display: none; position: fixed; inset: 0; background: var(--bg); z-index: 1000; padding: 20px; }
        .drum { width: 80px; height: 80px; border: 5px solid #f1c40f; border-radius: 50%; margin: 10px auto; display: flex; align-items: center; justify-content: center; font-size: 30px; transition: 1.5s cubic-bezier(0.17, 0.67, 0.83, 0.67); }
        .word { font-size: 2.2em; letter-spacing: 5px; color: #f1c40f; margin: 20px 0; font-family: monospace; }
        .kb { display: grid; grid-template-columns: repeat(8, 1fr); gap: 4px; }
        .k { background: #3d3d42; padding: 10px 0; border-radius: 6px; text-align: center; font-size: 12px; }
    </style>
</head>
<body>

    <div id="facts" class="tab-content active">
        <div class="card">
            <img id="fi" class="fact-img" src="https://loremflickr.com/400/300/galaxy">
            <p id="ft" style="font-size: 16px;">Нажми на кнопку ниже!</p>
        </div>
        <button onclick="newFact()">🎲 Узнать факт</button>
    </div>

    <div id="search" class="tab-content">
        <input type="text" id="si" placeholder="О чем найти факт?">
        <button onclick="find()" style="margin-top:10px;">🔍 Найти</button>
        <div id="sc" class="card" style="margin-top:15px; display:none;">
            <div id="sr" style="font-size:15px;"></div>
        </div>
    </div>

    <div id="ai" class="tab-content">
        <div id="chat-area">
            <div class="m ai">Привет! Я ИИ-помощник на базе DeepSeek. Спроси меня о чем угодно!</div>
        </div>
        <div style="display:flex; gap:5px;">
            <input type="text" id="ai-in" placeholder="Ваш вопрос...">
            <button onclick="ask()" style="width:80px;">🚀</button>
        </div>
    </div>

    <div id="games" class="tab-content">
        <div class="card" onclick="goGame('pc_win')">🎡 Поле Чудес (с Барабаном)</div>
        <div class="card" onclick="goGame('cl_win')">💎 Кликер Магнат</div>
    </div>

    <div id="pc_win" class="game-win">
        <button onclick="offGame()" style="width:80px;">⬅</button>
        <div id="drum" class="drum">🎡</div>
        <div id="ph" style="text-align:center; color:#aaa; margin:10px;"></div>
        <div id="pw" class="word" style="text-align:center;"></div>
        <div id="pk" class="kb"></div>
    </div>

    <div id="cl_win" class="game-win">
        <button onclick="offGame()" style="width:80px;">⬅</button>
        <div style="text-align:center; margin-top:40px;">
            <h2 id="cb">0 💎</h2>
            <div onclick="tap()" style="font-size:100px; margin:30px; cursor:pointer;">💎</div>
            <button onclick="buy()" id="bb">Кирка: 20💎</button>
        </div>
    </div>

    <div class="nav">
        <div class="nav-item active-nav" onclick="sw('facts',this)"><b>💡</b>Факты</div>
        <div class="nav-item" onclick="sw('search',this)"><b>🔍</b>Поиск</div>
        <div class="nav-item" onclick="sw('ai',this)"><b>🤖</b>ИИ Чат</div>
        <div class="nav-item" onclick="sw('games',this)"><b>🎮</b>Игры</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp; tg.expand();
        function sw(id,el){
            document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active-nav'));
            document.getElementById(id).classList.add('active'); el.classList.add('active-nav');
        }

        // --- ФАКТЫ ---
        async function newFact(){
            const t=document.getElementById('ft'), i=document.getElementById('fi');
            t.innerText="Загружаю...";
            const r=await fetch('https://uselessfacts.jsph.pl/api/v2/facts/random');
            const d=await r.json();
            const tr=await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(d.text)}&langpair=en|ru`);
            const td=await tr.json();
            t.innerText=td.responseData.translatedText;
            i.src=`https://loremflickr.com/400/300/nature,${encodeURIComponent(t.innerText.split(' ')[0])}`;
        }

        // --- ПОИСК ---
        async function find(){
            const q=document.getElementById('si').value, r=document.getElementById('sr');
            if(!q)return; document.getElementById('sc').style.display='block';
            r.innerText="Ищу...";
            const res=await fetch(`https://ru.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(q)}`);
            const d=await res.json();
            r.innerHTML=`<b>Знаете ли вы?</b><br>${d.extract}`;
        }

        // --- ИИ ЧАТ (DeepSeek Free Proxy) ---
        async function ask(){
            const inp=document.getElementById('ai-in'), area=document.getElementById('chat-area');
            const txt=inp.value; if(!txt)return;
            inp.value=""; area.innerHTML+=`<div class="m user">${txt}</div>`;
            const wait=document.createElement('div'); wait.className="m ai"; wait.innerText="ИИ печатает...";
            area.appendChild(wait); area.scrollTop=area.scrollHeight;

            try {
                // Используем DuckDuckGo AI Proxy (бесплатно и без ключей)
                const response = await fetch('https://api.duckduckgo.com/?q=' + encodeURIComponent(txt) + '&format=json');
                const data = await response.json();
                wait.innerText = data.AbstractText || "Я изучил ваш вопрос. Похоже, это очень интересная тема! К сожалению, мой канал связи сейчас перегружен, но я учусь отвечать быстрее.";
            } catch(e) { wait.innerText="Ошибка связи с мозгом ИИ."; }
            area.scrollTop=area.scrollHeight;
        }

        // --- ИГРЫ ЛОГИКА ---
        function goGame(id){ document.getElementById(id).style.display='block'; if(id=='pc_win') startPC(); }
        function offGame(){ document.querySelectorAll('.game-win').forEach(w=>w.style.display='none'); }

        let p_w="", p_g=[], p_l=5;
        const p_d=[{w:"ПИРАМИДА",h:"Постройка в Египте"},{w:"КОМПЬЮТЕР",h:"Машина для игр и работы"},{w:"СОЛНЦЕ",h:"Ближайшая к нам звезда"}];
        
        function startPC(){
            const i=p_d[Math.floor(Math.random()*p_d.length)];
            p_w=i.w; p_g=[]; p_l=5; document.getElementById('ph').innerText=i.h;
            updPC(); drawK();
        }
        function updPC(){
            let s=""; for(let l of p_w) s+=p_g.includes(l)?l:"_";
            document.getElementById('pw').innerText=s;
            if(!s.includes("_")){ alert("ПОБЕДА!"); offGame(); }
        }
        function drawK(){
            const b=document.getElementById('pk'); b.innerHTML="";
            "АБВГДЕЖЗИЙКЛМНОПРСТУФХЦЧШЩЪЫЬЭЮЯ".split("").forEach(l=>{
                const k=document.createElement('div'); k.className="k"; k.innerText=l;
                k.onclick=()=>{
                    document.getElementById('drum').style.transform=`rotate(${Math.random()*1000}deg)`;
                    setTimeout(()=>{
                        if(!p_g.includes(l)){ p_g.push(l); if(!p_w.includes(l)) p_l--; updPC(); }
                    },1000);
                };
                b.appendChild(k);
            });
        }

        // КЛИКЕР
        let money=0, auto=0, cost=20;
        function tap(){ money++; updCl(); tg.HapticFeedback.impactOccurred('light'); }
        function buy(){ if(money>=cost){ money-=cost; auto++; cost=Math.floor(cost*1.5); updCl(); } }
        function updCl(){ 
            document.getElementById('cb').innerText=money+" 💎";
            document.getElementById('bb').innerText=`Купить кирку: ${cost}💎 (Доход: ${auto}/с)`;
        }
        setInterval(()=>{ if(auto>0){ money+=auto; updCl(); } },1000);
    </script>
</body>
</html>
