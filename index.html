<!DOCTYPE html>
<html>
<head>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        :root { --bg: #0f0f0f; --accent: #e50914; --card: #1f1f1f; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: #fff; margin: 0; padding: 15px; }
        
        .header { font-size: 20px; font-weight: bold; margin-bottom: 15px; color: var(--accent); }
        .search-box { position: relative; margin-bottom: 20px; }
        input { width: 100%; padding: 16px; border-radius: 12px; border: 1px solid #333; background: #222; color: #fff; outline: none; font-size: 16px; box-sizing: border-box; }

        .suggestions { position: absolute; top: 100%; left: 0; width: 100%; background: var(--card); border-radius: 12px; margin-top: 5px; max-height: 400px; overflow-y: auto; z-index: 1000; box-shadow: 0 10px 30px rgba(0,0,0,0.5); display: none; }
        .sugg-item { display: flex; gap: 12px; padding: 10px; border-bottom: 1px solid #2a2a2a; align-items: center; }
        .sugg-item img { width: 50px; height: 75px; border-radius: 6px; object-fit: cover; }
        .sugg-title { font-size: 14px; font-weight: bold; }

        /* ОКНО ПЛЕЕРА */
        #player-overlay { display: none; position: fixed; inset: 0; background: #000; z-index: 2000; flex-direction: column; }
        .player-bar { padding: 10px; display: flex; justify-content: space-between; align-items: center; background: #111; border-bottom: 1px solid #222; }
        .p-btn { background: #333; color: #fff; border: none; padding: 8px 15px; border-radius: 8px; font-size: 12px; }
        
        .iframe-container { flex: 1; position: relative; background: #000; }
        iframe { width: 100%; height: 100%; border: none; }
        
        .external-link { text-align: center; padding: 20px; font-size: 14px; color: #aaa; }
    </style>
</head>
<body>

    <div class="header">🍿 Твой Кинотеатр</div>

    <div class="search-box">
        <input type="text" id="q" placeholder="Начни писать название..." oninput="liveSearch()">
        <div id="suggestions" class="suggestions"></div>
    </div>

    <div id="player-overlay">
        <div class="player-bar">
            <span id="p-title" style="font-size: 12px; font-weight: bold;">Загрузка...</span>
            <div style="display: flex; gap: 5px;">
                <button class="p-btn" id="open-ext" style="background: var(--accent);">В браузере 🌐</button>
                <button class="p-btn" onclick="stop()">Закрыть</button>
            </div>
        </div>
        <div class="iframe-container" id="video-wrap"></div>
        <div class="external-link">Если видео не грузится, нажми кнопку выше</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let timeout = null;
        const API_KEY = '8c8e1a50-6322-4135-8875-5d40a5420d86'; 

        function liveSearch() {
            const query = document.getElementById('q').value;
            const suggs = document.getElementById('suggestions');
            
            if(query.length < 3) { suggs.style.display = 'none'; return; }
            
            clearTimeout(timeout);
            timeout = setTimeout(async () => {
                const res = await fetch(`https://kinopoiskapiunofficial.tech/api/v2.1/films/search-by-keyword?keyword=${encodeURIComponent(query)}`, {
                    headers: { 'X-API-KEY': API_KEY }
                });
                const data = await res.json();
                
                suggs.innerHTML = '';
                suggs.style.display = 'block';
                
                data.films.slice(0, 8).forEach(f => {
                    const item = document.createElement('div');
                    item.className = 'sugg-item';
                    const title = f.nameRu || f.nameEn;
                    item.onclick = () => play(f.filmId, title);
                    item.innerHTML = `
                        <img src="${f.posterUrlPreview}">
                        <div class="sugg-title">${title} (${f.year})</div>
                    `;
                    suggs.appendChild(item);
                });
            }, 500);
        }

        function play(id, title) {
            document.getElementById('suggestions').style.display = 'none';
            document.getElementById('player-overlay').style.display = 'flex';
            document.getElementById('p-title').innerText = title;
            
            const wrap = document.getElementById('video-wrap');
            
            // Используем проверенный плеер, который лучше обходит блокировки
            const videoUrl = `https://vidsrc.to/embed/movie/${id}`; 
            // Или альтернатива: `https://kinobox.tv/embed/kp/${id}`
            
            wrap.innerHTML = `<iframe src="${videoUrl}" allowfullscreen sandbox="allow-forms allow-scripts allow-same-origin allow-presentation"></iframe>`;
            
            // Настраиваем кнопку открытия в браузере
            document.getElementById('open-ext').onclick = () => {
                tg.openLink(`https://kinobox.tv/embed/kp/${id}`);
            };

            tg.HapticFeedback.impactOccurred('medium');
        }

        function stop() {
            document.getElementById('player-overlay').style.display = 'none';
            document.getElementById('video-wrap').innerHTML = '';
        }
    </script>
</body>
</html>
