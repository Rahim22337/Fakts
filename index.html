<!DOCTYPE html>
<html lang="ru">
<head>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Кино HD</title>
    <style>
        :root { --bg: #0d0d0d; --card: #1a1a1a; --accent: #e50914; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: #fff; margin: 0; padding: 0; overflow-x: hidden; }
        
        /* Скрываем интерфейс, когда плеер открыт */
        body.player-is-open { overflow: hidden; }
        body.player-is-open .header, body.player-is-open .tab-bar, body.player-is-open .page {
            display: none !important;
        }

        .header { position: sticky; top: 0; z-index: 1000; padding: 12px; background: #111; border-bottom: 1px solid #222; }
        input { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #333; background: #222; color: #fff; outline: none; box-sizing: border-box; font-size: 16px; }

        .page { padding: 12px; padding-bottom: 140px; min-height: 100vh; box-sizing: border-box; display: none; }
        .page.active { display: block; }
        
        .movie-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .movie-card { background: var(--card); border-radius: 8px; overflow: hidden; position: relative; cursor: pointer; }
        .movie-card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; display: block; }
        .movie-card .info { padding: 6px; font-size: 11px; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .rating { position: absolute; top: 5px; right: 5px; background: rgba(229, 9, 20, 0.9); color: #fff; padding: 2px 5px; border-radius: 4px; font-size: 10px; font-weight: bold; }

        /* Полноэкранный контейнер плеера */
        #player-view { 
            display: none; 
            position: fixed; 
            inset: 0; 
            background: #000; 
            z-index: 10000; 
            flex-direction: column; 
        }
        .p-nav { 
            padding: 10px 15px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            background: #111; 
            height: 50px;
            border-bottom: 1px solid #222;
        }
        .iframe-wrap { flex: 1; position: relative; background: #000; width: 100%; height: 100%; }
        iframe { width: 100%; height: 100%; border: none; }

        .tab-bar { position: fixed; bottom: 0; width: 100%; background: #111; display: flex; border-top: 1px solid #222; padding: 12px 0 30px 0; z-index: 2000; }
        .tab { flex: 1; text-align: center; font-size: 11px; color: #666; }
        .tab.active { color: var(--accent); }
        .tab-icon { font-size: 22px; display: block; margin-bottom: 4px; }
        
        .btn-ui { background: #222; border: 1px solid #444; color: #fff; padding: 8px 12px; border-radius: 8px; font-size: 12px; }
    </style>
</head>
<body>

    <div class="header">
        <input type="text" id="searchInput" placeholder="Поиск фильма..." oninput="doSearch()">
    </div>

    <div id="home-page" class="page active">
        <h2 id="list-title" style="font-size: 18px;">🔥 Популярное</h2>
        <div id="main-grid" class="movie-grid"></div>
        <div id="loader" style="text-align: center; padding: 20px; color: #666;">Загрузка...</div>
    </div>

    <div id="fav-page" class="page">
        <h2>⭐ Избранное</h2>
        <div id="fav-grid" class="movie-grid"></div>
    </div>

    <div id="hist-page" class="page">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h2>⏳ История</h2>
            <span style="color: var(--accent); font-size: 12px; text-decoration: underline;" onclick="clearHistory()">Очистить</span>
        </div>
        <div id="hist-grid" class="movie-grid"></div>
    </div>

    <div id="player-view">
        <div class="p-nav">
            <button class="btn-ui" id="fav-toggle" onclick="toggleFav()">+ Избранное</button>
            <span id="p-title" style="font-size: 12px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 40%;"></span>
            <button class="btn-ui" onclick="closePlayer()" style="color: #ff4444; font-weight: bold;">✕ ЗАКРЫТЬ</button>
        </div>
        <div class="iframe-wrap" id="v-container"></div>
    </div>

    <div class="tab-bar">
        <div class="tab active" onclick="nav('home-page', this)"><span class="tab-icon">🎬</span>Главная</div>
        <div class="tab" onclick="nav('fav-page', this)"><span class="tab-icon">⭐</span>Избранное</div>
        <div class="tab" onclick="nav('hist-page', this)"><span class="tab-icon">⏳</span>История</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand(); // Сразу расширяем приложение при запуске

        const API_KEY = '8c8e1a50-6322-4135-8875-5d40a5420d86';
        let page = 1;
        let isSearching = false;
        let currentMovie = null;
        let loading = false;

        window.onload = () => {
            loadHome();
            updateGrids();
            window.addEventListener('scroll', () => {
                if (!isSearching && !loading && (window.innerHeight + window.scrollY) >= document.body.offsetHeight - 800) {
                    loadHome();
                }
            });
        };

        function nav(id, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
            window.scrollTo(0,0);
        }

        async function loadHome() {
            if (loading) return;
            loading = true;
            try {
                const r = await fetch(`https://kinopoiskapiunofficial.tech/api/v2.2/films/collections?type=TOP_POPULAR_MOVIES&page=${page}`, {
                    headers: { 'X-API-KEY': API_KEY }
                });
                const d = await r.json();
                renderItems('main-grid', d.items, true);
                page++;
            } catch (e) { console.error(e); }
            loading = false;
            document.getElementById('loader').style.display = 'none';
        }

        function doSearch() {
            const q = document.getElementById('searchInput').value;
            const title = document.getElementById('list-title');
            if (q.length < 3) {
                if(isSearching) {
                    isSearching = false;
                    document.getElementById('main-grid').innerHTML = '';
                    page = 1; loadHome();
                    title.innerText = "🔥 Популярное";
                }
                return;
            }
            isSearching = true;
            title.innerText = "🔍 Результаты поиска";
            fetch(`https://kinopoiskapiunofficial.tech/api/v2.1/films/search-by-keyword?keyword=${encodeURIComponent(q)}`, {
                headers: { 'X-API-KEY': API_KEY }
            }).then(r => r.json()).then(d => {
                renderItems('main-grid', d.films.map(f => ({...f, kinopoiskId: f.filmId})), false);
            });
        }

        function renderItems(containerId, items, append) {
            const grid = document.getElementById(containerId);
            if (!append) grid.innerHTML = '';
            items.forEach(m => {
                const card = document.createElement('div');
                card.className = 'movie-card';
                const id = m.kinopoiskId || m.filmId;
                card.onclick = () => openPlayer(id, m.nameRu || m.nameEn, m.posterUrlPreview);
                card.innerHTML = `
                    <div class="rating">${m.ratingKinopoisk || m.rating || '—'}</div>
                    <img src="${m.posterUrlPreview}" loading="lazy">
                    <div class="info">${m.nameRu || m.nameEn}</div>
                `;
                grid.appendChild(card);
            });
        }

        function openPlayer(id, title, img) {
            currentMovie = { kinopoiskId: id, nameRu: title, posterUrlPreview: img };
            
            // Активируем режим плеера
            document.body.classList.add('player-is-open');
            document.getElementById('player-view').style.display = 'flex';
            document.getElementById('p-title').innerText = title;
            
            // Используем проверенный плеер GG
            const url = `https://www.kinopoisk.gg/film/${id}/`;
            
            document.getElementById('v-container').innerHTML = `
                <iframe src="${url}" 
                    allowfullscreen="true" 
                    webkitallowfullscreen="true" 
                    mozallowfullscreen="true"
                    allow="autoplay; fullscreen; screen-wake-lock">
                </iframe>`;
            
            saveToHistory(currentMovie);
            updateFavBtn();
            tg.expand(); 
            tg.HapticFeedback.impactOccurred('medium');
        }

        function closePlayer() {
            document.body.classList.remove('player-is-open');
            document.getElementById('player-view').style.display = 'none';
            document.getElementById('v-container').innerHTML = '';
            tg.HapticFeedback.notificationOccurred('success');
        }

        function saveToHistory(m) {
            let h = JSON.parse(localStorage.getItem('hist') || '[]');
            h = h.filter(x => x.kinopoiskId !== m.kinopoiskId);
            h.unshift(m);
            localStorage.setItem('hist', JSON.stringify(h.slice(0, 30)));
            updateGrids();
        }

        function toggleFav() {
            let f = JSON.parse(localStorage.getItem('favs') || '[]');
            const isF = f.some(x => x.kinopoiskId === currentMovie.kinopoiskId);
            if (isF) f = f.filter(x => x.kinopoiskId !== currentMovie.kinopoiskId);
            else f.push(currentMovie);
            localStorage.setItem('favs', JSON.stringify(f));
            updateFavBtn();
            updateGrids();
        }

        function updateFavBtn() {
            const f = JSON.parse(localStorage.getItem('favs') || '[]');
            const isF = f.some(x => x.kinopoiskId === currentMovie.kinopoiskId);
            document.getElementById('fav-toggle').innerText = isF ? '★ В избранном' : '+ Избранное';
        }

        function updateGrids() {
            renderItems('fav-grid', JSON.parse(localStorage.getItem('favs') || '[]'), false);
            renderItems('hist-grid', JSON.parse(localStorage.getItem('hist') || '[]'), false);
        }

        function clearHistory() {
            if(confirm('Очистить историю?')) {
                localStorage.setItem('hist', '[]');
                updateGrids();
            }
        }
    </script>
</body>
</html>
