<!DOCTYPE html>
<html>
<head>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        :root { --bg: #0d0d0d; --card: #1a1a1a; --accent: #e50914; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: #fff; margin: 0; padding: 0; }
        
        .header { position: sticky; top: 0; z-index: 1000; padding: 12px; background: #111; border-bottom: 1px solid #222; }
        input { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #333; background: #222; color: #fff; outline: none; box-sizing: border-box; font-size: 16px; }

        .page { display: none; padding: 12px; padding-bottom: 120px; min-height: 100vh; box-sizing: border-box; }
        .page.active { display: block; }
        h2 { font-size: 18px; margin: 10px 0; }

        .movie-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .movie-card { background: var(--card); border-radius: 8px; overflow: hidden; position: relative; }
        .movie-card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; display: block; }
        .movie-card .info { padding: 6px; font-size: 11px; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .rating { position: absolute; top: 5px; right: 5px; background: rgba(0,0,0,0.8); color: #f1c40f; padding: 2px 5px; border-radius: 4px; font-size: 10px; font-weight: bold; }

        /* ИСПРАВЛЕННЫЙ ТАББАР */
        .tab-bar { 
            position: fixed; 
            bottom: 0; 
            width: 100%; 
            background: #111; 
            display: flex; 
            border-top: 1px solid #222; 
            padding: 12px 0 25px 0; /* Подняли текст выше */
            z-index: 2000; 
        }
        .tab { flex: 1; text-align: center; font-size: 11px; color: #666; transition: 0.2s; }
        .tab.active { color: var(--accent); }
        .tab-icon { font-size: 22px; display: block; margin-bottom: 4px; }

        #player-view { display: none; position: fixed; inset: 0; background: #000; z-index: 5000; flex-direction: column; }
        .p-nav { padding: 12px; display: flex; justify-content: space-between; align-items: center; background: #111; }
        .iframe-wrap { flex: 1; background: #000; }
        iframe { width: 100%; height: 100%; border: none; }
        .btn-ui { background: #222; border: 1px solid #444; color: #fff; padding: 6px 12px; border-radius: 6px; font-size: 12px; }
        
        .loading-text { grid-column: 1/4; text-align: center; padding: 20px; color: #666; }
    </style>
</head>
<body>

    <div class="header">
        <input type="text" id="searchInput" placeholder="Поиск фильма..." oninput="doSearch()">
    </div>

    <div id="home-page" class="page active">
        <h2 id="list-title">🔥 Популярное</h2>
        <div id="main-grid" class="movie-grid"></div>
        <div id="loader" class="loading-text">Загрузка...</div>
    </div>

    <div id="fav-page" class="page">
        <h2>⭐ Избранное</h2>
        <div id="fav-grid" class="movie-grid"></div>
    </div>

    <div id="hist-page" class="page">
        <h2>⏳ История</h2>
        <div id="hist-grid" class="movie-grid"></div>
    </div>

    <div id="player-view">
        <div class="p-nav">
            <button class="btn-ui" id="fav-toggle" onclick="toggleFav()">+ Избранное</button>
            <span id="p-title" style="font-size: 12px; max-width: 50%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;"></span>
            <button class="btn-ui" onclick="closePlayer()" style="color: #ff4444;">✕</button>
        </div>
        <div class="iframe-wrap" id="v-container"></div>
    </div>

    <div class="tab-bar">
        <div class="tab active" onclick="nav('home-page', this)"><span class="tab-icon">🎬</span>Главная</div>
        <div class="tab" onclick="nav('fav-page', this)"><span class="tab-icon">⭐</span>Избранное</div>
        <div class="tab" onclick="nav('hist-page', this)"><span class="tab-icon">⏳</span>История</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        const API_KEY = '8c8e1a50-6322-4135-8875-5d40a5420d86';
        
        let page = 1;
        let isSearching = false;
        let currentMovie = null;
        let loading = false;

        window.onload = () => {
            loadHome();
            updateGrids();
            window.addEventListener('scroll', () => {
                if (!isSearching && !loading && (window.innerHeight + window.scrollY) >= document.body.offsetHeight - 800) {
                    loadHome();
                }
            });
        };

        function nav(id, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
            window.scrollTo(0,0);
        }

        async function loadHome() {
            loading = true;
            try {
                const r = await fetch(`https://kinopoiskapiunofficial.tech/api/v2.2/films/collections?type=TOP_POPULAR_MOVIES&page=${page}`, {
                    headers: { 'X-API-KEY': API_KEY }
                });
                const d = await r.json();
                renderItems('main-grid', d.items, true);
                page++;
            } catch (e) {}
            loading = false;
        }

        let sTimer;
        function doSearch() {
            clearTimeout(sTimer);
            const q = document.getElementById('searchInput').value;
            sTimer = setTimeout(async () => {
                const grid = document.getElementById('main-grid');
                const title = document.getElementById('list-title');
                if (q.length < 3) {
                    isSearching = false;
                    page = 1;
                    grid.innerHTML = '';
                    title.innerText = "🔥 Популярное";
                    loadHome();
                    return;
                }
                isSearching = true;
                title.innerText = "🔍 Результаты";
                const r = await fetch(`https://kinopoiskapiunofficial.tech/api/v2.1/films/search-by-keyword?keyword=${encodeURIComponent(q)}`, {
                    headers: { 'X-API-KEY': API_KEY }
                });
                const d = await r.json();
                renderItems('main-grid', d.films.map(f => ({...f, kinopoiskId: f.filmId})), false);
            }, 600);
        }

        function renderItems(containerId, items, append) {
            const grid = document.getElementById(containerId);
            if (!append) grid.innerHTML = '';
            items.forEach(m => {
                const card = document.createElement('div');
                card.className = 'movie-card';
                card.onclick = () => openPlayer(m.kinopoiskId || m.filmId, m.nameRu || m.nameEn, m.posterUrlPreview);
                card.innerHTML = `
                    <div class="rating">${m.ratingKinopoisk || m.rating || '—'}</div>
                    <img src="${m.posterUrlPreview}" loading="lazy">
                    <div class="info">${m.nameRu || m.nameEn}</div>
                `;
                grid.appendChild(card);
            });
        }

        function openPlayer(id, title, img) {
            currentMovie = { kinopoiskId: id, nameRu: title, posterUrlPreview: img };
            document.getElementById('player-view').style.display = 'flex';
            document.getElementById('p-title').innerText = title;
            
            // ИСПРАВЛЕННЫЙ ПЛЕЕР С ЗАЩИТОЙ
            const url = `https://www.kinopoisk.gg/film/${id}/?player=2`;
            document.getElementById('v-container').innerHTML = `
                <iframe src="${url}" 
                    allowfullscreen 
                    sandbox="allow-forms allow-scripts allow-same-origin"
                    style="background: #000;">
                </iframe>`;
            
            saveToHistory(currentMovie);
            updateFavBtn();
            tg.HapticFeedback.impactOccurred('medium');
        }

        function closePlayer() {
            document.getElementById('player-view').style.display = 'none';
            document.getElementById('v-container').innerHTML = '';
        }

        function saveToHistory(m) {
            let h = JSON.parse(localStorage.getItem('hist') || '[]');
            h = h.filter(x => x.kinopoiskId !== m.kinopoiskId);
            h.unshift(m);
            localStorage.setItem('hist', JSON.stringify(h.slice(0, 30)));
            updateGrids();
        }

        function toggleFav() {
            let f = JSON.parse(localStorage.getItem('favs') || '[]');
            const isF = f.some(x => x.kinopoiskId === currentMovie.kinopoiskId);
            if (isF) f = f.filter(x => x.kinopoiskId !== currentMovie.kinopoiskId);
            else f.push(currentMovie);
            localStorage.setItem('favs', JSON.stringify(f));
            updateFavBtn();
            updateGrids();
        }

        function updateFavBtn() {
            const f = JSON.parse(localStorage.getItem('favs') || '[]');
            const isF = f.some(x => x.kinopoiskId === currentMovie.kinopoiskId);
            document.getElementById('fav-toggle').innerText = isF ? '★ В избранном' : '+ Избранное';
        }

        function updateGrids() {
            renderItems('fav-grid', JSON.parse(localStorage.getItem('favs') || '[]'), false);
            renderItems('hist-grid', JSON.parse(localStorage.getItem('hist') || '[]'), false);
        }
    </script>
</body>
</html>
