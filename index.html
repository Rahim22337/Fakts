<!DOCTYPE html>
<html>
<head>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
            padding: 20px;
        }
        .fact-card {
            background: var(--tg-theme-secondary-bg-color, #f0f0f0);
            padding: 30px;
            border-radius: 25px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            margin-bottom: 30px;
            font-size: 1.3em;
            min-height: 150px;
            display: flex;
            align-items: center;
        }
        button {
            background: var(--tg-theme-button-color, #248bed);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none;
            padding: 18px 35px;
            border-radius: 15px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1.1em;
            transition: transform 0.1s;
        }
        button:active { transform: scale(0.95); }
    </style>
</head>
<body>
    <div class="fact-card" id="fact-text">Нажми на кнопку, чтобы узнать факт из интернета!</div>
    <button id="next-btn" onclick="fetchFact()">Узнать что-то новое</button>

    <script>
        const factElement = document.getElementById('fact-text');
        const btn = document.getElementById('next-btn');

        async function fetchFact() {
            factElement.innerText = "Ищу что-то интересное...";
            btn.disabled = true;

            try {
                // 1. Берем случайный факт (на английском)
                const response = await fetch('https://uselessfacts.jsph.pl/api/v2/facts/random');
                const data = await response.json();
                const englishFact = data.text;

                // 2. Переводим на русский через бесплатный API перевода
                const translateRes = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(englishFact)}&langpair=en|ru`);
                const translateData = await translateRes.json();
                
                factElement.innerText = translateData.responseData.translatedText;
            } catch (error) {
                factElement.innerText = "Ой! Интернет барахлит. Попробуй еще раз.";
            } finally {
                btn.disabled = false;
            }
        }

        window.Telegram.WebApp.ready();
        window.Telegram.WebApp.expand(); // Развернуть на весь экран
    </script>
</body>
</html>
