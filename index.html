<!DOCTYPE html>
<html>
<head>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        :root { --bg: #1c1c1d; --text: #fff; --btn: #007aff; --sec: #2c2c2e; --accent: #f1c40f; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 80px; overflow: hidden; touch-action: none; }
        .tab-content { display: none; padding: 15px; height: calc(100vh - 80px); overflow-y: auto; box-sizing: border-box; }
        .active { display: block; }
        
        /* Навигация */
        .nav { position: fixed; bottom: 0; width: 100%; background: var(--sec); display: flex; height: 70px; border-top: 0.5px solid #333; z-index: 1000; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 10px; opacity: 0.5; color: #fff; }
        .nav-item.active-nav { opacity: 1; color: var(--btn); }
        .nav-item b { font-size: 20px; margin-bottom: 2px; }

        .card { background: var(--sec); border-radius: 16px; padding: 15px; margin-bottom: 12px; }
        button { background: var(--btn); color: #fff; border: none; padding: 12px; border-radius: 10px; font-weight: bold; width: 100%; cursor: pointer; }
        button:disabled { background: #555; opacity: 0.6; cursor: not-allowed; }
        input { width: 100%; padding: 12px; border-radius: 10px; border: none; background: #3d3d42; color: #fff; box-sizing: border-box; }

        /* ИИ ЧАТ */
        #chat-area { height: 300px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; margin-bottom: 10px; padding: 5px; }
        .m { padding: 12px; border-radius: 15px; max-width: 85%; font-size: 14px; line-height: 1.4; }
        .ai { background: #3a3a3c; align-self: flex-start; color: #5ac8fa; border-bottom-left-radius: 2px; }
        .user { background: var(--btn); align-self: flex-end; border-bottom-right-radius: 2px; }

        /* ИГРЫ */
        .grid { width: 280px; height: 280px; background: #bbada0; border-radius: 6px; margin: 10px auto; display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; padding: 10px; box-sizing: border-box; }
        .cell { width: 57px; height: 57px; background: rgba(238, 228, 218, 0.35); border-radius: 3px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 20px; color: #776e65; }
        .v2 { background: #eee4da; } .v4 { background: #ede0c8; } .v8 { background: #f2b179; color: #fff; }
        .v16 { background: #f59563; color: #fff; } .v32 { background: #f67c5f; color: #fff; }
        .game-win { display: none; position: fixed; inset: 0; background: var(--bg); z-index: 1100; padding: 15px; overflow-y: auto; }
        .pc-key { background: #3d3d42; padding: 10px 0; border-radius: 6px; text-align: center; font-weight: bold; cursor:pointer;}
    </style>
</head>
<body>

    <div id="facts" class="tab-content active">
        <div class="card">
            <div style="position:relative; width:100%; height:200px; border-radius:12px; background:#333; overflow:hidden;">
                <img id="f-img" style="width:100%; height:100%; object-fit:cover; transition: opacity 0.5s;" src="https://picsum.photos/400/300?blur">
                <div id="img-loader" style="position:absolute; inset:0; background:rgba(0,0,0,0.7); display:none; flex-direction:column; align-items:center; justify-content:center;">
                    <span style="font-size:30px;">🎨</span>
                    <small>Нейросеть рисует...</small>
                </div>
            </div>
            <p id="f-text" style="margin-top:15px; font-size:16px;">Нажми на кнопку ниже, и я узнаю факт, а нейросеть **нарисует** его для тебя!</p>
        </div>
        <button onclick="generateEverything()" id="gen-btn">🎨 Сгенерировать новый факт и картинку</button>
    </div>

    <div id="ai" class="tab-content">
        <div id="chat-area"></div>
        <div style="display:flex; gap:5px;">
            <input type="text" id="ai-in" placeholder="Спроси что угодно...">
            <button onclick="ask()" style="width:60px;">🚀</button>
        </div>
    </div>

    <div id="games" class="tab-content">
        <div class="card" onclick="openGame('g2048')">🔢 Игра 2048</div>
        <div class="card" onclick="openGame('pc')">🎡 Поле Чудес</div>
        <div class="card" onclick="openGame('cl')">💎 Кликер (Магазин)</div>
    </div>

    <div id="g2048" class="game-win">
        <button onclick="closeGame()" style="width:60px;">⬅</button>
        <h3 style="text-align:center;">Счет: <span id="sc-val">0</span></h3>
        <div class="grid" id="grid"></div>
    </div>

    <div id="pc" class="game-win">
        <button onclick="closeGame()" style="width:60px;">⬅</button>
        <div style="text-align:center; margin-top:10px;">
            <p id="pc-hint" style="color:var(--accent); font-style:italic;"></p>
            <p id="pc-lives" style="font-size:20px;"></p>
            <div id="pc-word" style="font-size:35px; letter-spacing:8px; margin:20px 0; font-family:monospace; background:#333; padding:10px; border-radius:10px;"></div>
            <div id="pc-kb" style="display:grid; grid-template-columns:repeat(8,1fr); gap:5px;"></div>
        </div>
    </div>

    <div id="cl" class="game-win">
        <button onclick="closeGame()" style="width:60px;">⬅</button>
        <div style="text-align:center; margin-top:30px;">
            <h1 id="cl-bal">0 💎</h1>
            <div onclick="tap()" style="font-size:120px; cursor:pointer;">💎</div>
            <div class="card" style="text-align:left; margin-top:20px;">
                <button onclick="buy(1)" id="u1-btn" style="margin-bottom:10px;">⛏ Клик (+${ppc}) : ${u1c} 💎</button>
                <button onclick="buy(2)" id="u2-btn" style="background:#28a745;">🤖 Робот (+${pps}/с) : ${u2c} 💎</button>
            </div>
        </div>
    </div>

    <div class="nav">
        <div class="nav-item active-nav" onclick="sw('facts',this)"><b>💡</b>Факты</div>
        <div class="nav-item" onclick="sw('ai',this)"><b>🤖</b>ИИ Чат</div>
        <div class="nav-item" onclick="sw('games',this)"><b>🎮</b>Игры</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp; tg.expand();
        let state = JSON.parse(localStorage.getItem('fDataV5')) || { bal:0, ppc:1, pps:0, u1c:50, u2c:100 };

        function sw(id,el){
            document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active-nav'));
            document.getElementById(id).classList.add('active'); el.classList.add('active-nav');
        }

        // --- УЛУЧШЕННЫЕ ФАКТЫ И КАРТИНКИ (ФИКС) ---
        async function nextFact() {
            const t = document.getElementById('f-text'), i = document.getElementById('f-img');
            t.innerText = "Ищу факт...";
            i.src = "https://picsum.photos/400/300?random=" + Math.random(); 
            try {
                const r = await fetch('https://uselessfacts.jsph.pl/api/v2/facts/random');
                const d = await r.json();
                const tr = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(d.text)}&langpair=en|ru`);
                const td = await tr.json();
                t.innerText = td.responseData.translatedText;
            } catch(e) { t.innerText = "Ошибка сети. Попробуй еще раз!"; }
        }

        // --- ГЕНЕРАТОР (ФАКТ + КАРТИНКА) ---
        async function generateEverything() {
            const t = document.getElementById('f-text'), i = document.getElementById('f-img');
            const loader = document.getElementById('img-loader'), btn = document.getElementById('gen-btn');
            
            t.innerText = "🌀 Ищу факт и запускаю нейросеть...";
            loader.style.display = 'flex'; btn.disabled = true; i.style.opacity = '0.3';

            try {
                // 1. Получаем факт
                const fr = await fetch('https://uselessfacts.jsph.pl/api/v2/facts/random');
                const fd = await fr.json();
                
                // 2. Переводим факт
                const tr = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(fd.text)}&langpair=en|ru`);
                const td = await tr.json();
                const factText = td.responseData.translatedText;
                t.innerText = factText;

                // 3. Отправляем текст факта (на английском) в генератор Stable Diffusion
                // Pollinations генерирует картинку прямо по ссылке, нужно только добавить random seed
                const seed = Math.floor(Math.random() * 1000000);
                i.src = `https://image.pollinations.ai/prompt/${encodeURIComponent(fd.text)}?width=400&height=300&nologo=true&seed=${seed}`;
                
                // Ожидаем загрузки сгенерированной картинки
                i.onload = () => {
                    loader.style.display = 'none'; btn.disabled = false; i.style.opacity = '1';
                };

            } catch(e) {
                t.innerText = "Упс! Нейросеть устала. Давай попробуем еще раз?";
                loader.style.display = 'none'; btn.disabled = false; i.style.opacity = '1';
            }
        }

        // --- ИИ ЧАТ ---
        async function ask(){
            const inp=document.getElementById('ai-in'), a=document.getElementById('chat-area');
            if(!inp.value) return;
            const q = inp.value; inp.value="";
            a.innerHTML += `<div class="m user">${q}</div>`;
            const m = document.createElement('div'); m.className="m ai"; m.innerText="...";
            a.appendChild(m); a.scrollTop = a.scrollHeight;
            try {
                const prompt = "Ты умный ассистент, говори на русском языке. Запрос: " + q;
                const r = await fetch(`https://text.pollinations.ai/${encodeURIComponent(prompt)}`);
                m.innerText = await r.text();
            } catch(e) { m.innerText = "Связь прервалась!"; }
            a.scrollTop = a.scrollHeight;
        }

        // --- 2048 С УСЛОВИЯМИ ПОБЕДЫ/ПОРАЖЕНИЯ ---
        let b2048, score=0, wonAlerted=false;
        function init2048(){ b2048 = Array(4).fill().map(()=>Array(4).fill(0)); score=0; wonAlerted=false; addT(); addT(); draw2048(); }
        function addT(){
            let em = []; for(let r=0; r<4; r++) for(let c=0; c<4; c++) if(b2048[r][c]===0) em.push({r,c});
            if(em.length){ let {r,c} = em[Math.floor(Math.random()*em.length)]; b2048[r][c] = Math.random()>0.1?2:4; }
        }
        function draw2048(){
            const g = document.getElementById('grid'); g.innerHTML="";
            b2048.forEach(row => row.forEach(v => {
                const c = document.createElement('div'); c.className = `cell ${v?'v'+v:''}`;
                c.innerText = v || ""; g.appendChild(c);
            }));
            document.getElementById('sc-val').innerText = score;
        }
        function slide(row) {
            let arr = row.filter(v => v);
            for(let i=0; i<arr.length-1; i++) if(arr[i]===arr[i+1]){ arr[i]*=2; score+=arr[i]; arr.splice(i+1, 1); }
            while(arr.length < 4) arr.push(0); return arr;
        }
        function checkGameOver() {
            if(!wonAlerted && b2048.some(row => row.includes(2048))) {
                setTimeout(()=>alert("🎉 ПОБЕДА! Ты собрал 2048!"), 100);
                wonAlerted = true;
            }
            if(b2048.some(row => row.includes(0))) return;
            for(let r=0; r<4; r++) for(let c=0; c<4; c++){
                    if(c<3 && b2048[r][c]===b2048[r][c+1]) return;
                    if(r<3 && b2048[r][c]===b2048[r+1][c]) return;
            }
            setTimeout(()=>{ alert("💀 Игра окончена! Нет ходов. Счет: " + score); init2048(); }, 200);
        }
        function move(dir) {
            let old = JSON.stringify(b2048);
            for(let i=0; i<4; i++){
                if(dir==='L') b2048[i] = slide(b2048[i]);
                if(dir==='R') b2048[i] = slide(b2048[i].reverse()).reverse();
                if(dir==='U' || dir==='D'){
                    let col = [b2048[0][i], b2048[1][i], b2048[2][i], b2048[3][i]];
                    if(dir==='U') col = slide(col); else col = slide(col.reverse()).reverse();
                    for(let r=0; r<4; r++) b2048[r][i] = col[r];
                }
            }
            if(old !== JSON.stringify(b2048)) { addT(); draw2048(); checkGameOver(); }
        }
        let sx, sy;
        document.getElementById('grid').addEventListener('touchstart', e=>{ sx=e.touches[0].clientX; sy=e.touches[0].clientY; });
        document.getElementById('grid').addEventListener('touchend', e=>{
            let dx = e.changedTouches[0].clientX - sx, dy = e.changedTouches[0].clientY - sy;
            if(Math.abs(dx) > Math.abs(dy)){ if(Math.abs(dx)>30) move(dx>0?'R':'L'); }
            else { if(Math.abs(dy)>30) move(dy>0?'D':'U'); }
        });

        // --- КЛИКЕР И ПОЛЕ ЧУДЕС (БЕЗ ИЗМЕНЕНИЙ) ---
        function openGame(id){ document.getElementById(id).style.display='block'; if(id==='g2048') init2048(); if(id==='pc') initPC(); updCl(); }
        function closeGame(){ document.querySelectorAll('.game-win').forEach(w=>w.style.display='none'); }
        function updCl(){
            document.getElementById('cl-bal').innerText=Math.floor(state.bal)+" 💎";
            document.getElementById('u1-btn').innerText=`⛏ Клик (+${state.ppc}) : ${state.u1c} 💎`;
            document.getElementById('u2-btn').innerText=`🤖 Робот (+${state.pps}/с) : ${state.u2c} 💎`;
        }
        function tap(){ state.bal+=state.ppc; updCl(); save(); tg.HapticFeedback.impactOccurred('light'); }
        function buy(t){
            if(t===1 && state.bal>=state.u1c){ state.bal-=state.u1c; state.ppc++; state.u1c=Math.floor(state.u1c*1.6); }
            else if(t===2 && state.bal>=state.u2c){ state.bal-=state.u2c; state.pps++; state.u2c=Math.floor(state.u2c*1.8); }
            updCl(); save();
        }
        function save(){ localStorage.setItem('fDataV5', JSON.stringify(state)); }
        setInterval(()=>{ if(state.pps>0){ state.bal+=state.pps; updCl(); save(); } }, 1000);

        let pcW, pcG, pcL;
        const wordsD = [{w:"ПЛАНЕТА",h:"Вокруг солнца летает"},{w:"СЕРДЦЕ",h:"Главный орган человека"},{w:"ТЕЛЕГРАМ",h:"Там, где ты сейчас находится"}];
        function initPC(){
            let item = wordsD[Math.floor(Math.random()*wordsD.length)]; pcW=item.w; pcG=[]; pcL=5;
            document.getElementById('pc-hint').innerText="Подсказка: "+item.h;
            const kb = document.getElementById('pc-kb'); kb.innerHTML="";
            "АБВГДЕЖЗИЙКЛМНОПРСТУФХЦЧШЩЪЫЬЭЮЯ".split("").forEach(l=>{
                const b = document.createElement('div'); b.className="pc-key"; b.innerText=l;
                b.onclick=()=>{ if(b.style.opacity==="0.3") return; pcG.push(l); b.style.opacity=0.3; if(!pcW.includes(l)) pcL--; drawPC(); };
                kb.appendChild(b);
            });
            drawPC();
        }
        function drawPC(){
            let s=""; for(let l of pcW) s+=pcG.includes(l)?l:"_";
            document.getElementById('pc-word').innerText=s;
            document.getElementById('pc-lives').innerText="❤️".repeat(pcL>0?pcL:0);
            if(!s.includes("_")) { alert("ПОБЕДА!"); initPC(); } else if(pcL<=0) { alert("ПРОИГРЫШ! Слово: "+pcW); initPC(); }
        }
        updCl();
    </script>
</body>
</html>
