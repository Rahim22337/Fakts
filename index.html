<!DOCTYPE html>
<html>
<head>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        :root { --bg: #1c1c1d; --text: #fff; --btn: #007aff; --sec: #2c2c2e; --accent: #f1c40f; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 80px; overflow: hidden; }
        .tab-content { display: none; padding: 15px; height: calc(100vh - 80px); overflow-y: auto; box-sizing: border-box; }
        .active { display: block; }
        
        /* Навигация */
        .nav { position: fixed; bottom: 0; width: 100%; background: var(--sec); display: flex; height: 70px; border-top: 0.5px solid #333; z-index: 1000; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 10px; opacity: 0.5; color: #fff; }
        .nav-item.active-nav { opacity: 1; color: var(--btn); }
        .nav-item b { font-size: 20px; margin-bottom: 2px; }

        /* Карточки и кнопки */
        .card { background: var(--sec); border-radius: 16px; padding: 15px; margin-bottom: 12px; }
        button { background: var(--btn); color: #fff; border: none; padding: 12px; border-radius: 10px; font-weight: bold; width: 100%; cursor: pointer; }
        input { width: 100%; padding: 12px; border-radius: 10px; border: none; background: #3d3d42; color: #fff; box-sizing: border-box; }

        /* ИИ Чат */
        #chat-area { height: 250px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; margin-bottom: 10px; border-bottom: 1px solid #333; }
        .m { padding: 10px; border-radius: 12px; max-width: 85%; font-size: 14px; }
        .ai { background: #3a3a3c; align-self: flex-start; color: #5ac8fa; }
        .user { background: var(--btn); align-self: flex-end; }

        /* 2048 Стили */
        .grid { width: 280px; height: 280px; background: #bbada0; border-radius: 6px; margin: 10px auto; display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; padding: 10px; box-sizing: border-box; touch-action: none; }
        .cell { width: 57px; height: 57px; background: rgba(238, 228, 218, 0.35); border-radius: 3px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 20px; color: #776e65; transition: transform 0.1s; }
        .v2 { background: #eee4da; } .v4 { background: #ede0c8; } .v8 { background: #f2b179; color: #fff; }
        .v16 { background: #f59563; color: #fff; } .v32 { background: #f67c5f; color: #fff; }

        .game-win { display: none; position: fixed; inset: 0; background: var(--bg); z-index: 1100; padding: 15px; }
    </style>
</head>
<body>

    <div id="facts" class="tab-content active">
        <div class="card">
            <img id="f-img" style="width:100%; height:180px; border-radius:12px; object-fit:cover;" src="https://picsum.photos/400/300?nature">
            <p id="f-text" style="margin-top:10px;">Нажми кнопку, чтобы узнать факт!</p>
        </div>
        <button onclick="nextFact()">🎲 Другой факт</button>
    </div>

    <div id="search" class="tab-content">
        <input type="text" id="s-in" placeholder="О чем найти факт?">
        <button onclick="wiki()" style="margin-top:10px;">🔍 Найти</button>
        <div id="s-res" class="card" style="margin-top:15px; display:none;">
            <p id="s-out"></p>
        </div>
    </div>

    <div id="ai" class="tab-content">
        <div id="chat-area"></div>
        <div style="display:flex; gap:5px;">
            <input type="text" id="ai-in" placeholder="Спроси что угодно...">
            <button onclick="ask()" style="width:60px;">🚀</button>
        </div>
    </div>

    <div id="games" class="tab-content">
        <div class="card" onclick="openGame('g2048')">🔢 Игра 2048 (Свайпы)</div>
        <div class="card" onclick="openGame('pc')">🎡 Поле Чудес</div>
        <div class="card" onclick="openGame('cl')">💎 Кликер Магнат</div>
    </div>

    <div id="g2048" class="game-win">
        <button onclick="closeGame()" style="width:60px;">⬅</button>
        <h3 style="text-align:center;">Счет: <span id="sc-val">0</span></h3>
        <div class="grid" id="grid"></div>
        <p style="text-align:center; color:#aaa;">Свайпай пальцем по полю!</p>
    </div>

    <div id="pc" class="game-win">
        <button onclick="closeGame()" style="width:60px;">⬅</button>
        <div id="pc-word" style="font-size:30px; text-align:center; margin:40px 0; letter-spacing:5px;"></div>
        <div id="pc-kb" style="display:grid; grid-template-columns:repeat(8,1fr); gap:5px;"></div>
    </div>

    <div id="cl" class="game-win">
        <button onclick="closeGame()" style="width:60px;">⬅</button>
        <div style="text-align:center; margin-top:50px;">
            <h1 id="cl-bal">0 💎</h1>
            <div onclick="tap()" style="font-size:100px; cursor:pointer;">💎</div>
        </div>
    </div>

    <div class="nav">
        <div class="nav-item active-nav" onclick="sw('facts',this)"><b>💡</b>Факты</div>
        <div class="nav-item" onclick="sw('search',this)"><b>🔍</b>Поиск</div>
        <div class="nav-item" onclick="sw('ai',this)"><b>🤖</b>ИИ Чат</div>
        <div class="nav-item" onclick="sw('games',this)"><b>🎮</b>Игры</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp; tg.expand();
        function sw(id,el){
            document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active-nav'));
            document.getElementById(id).classList.add('active'); el.classList.add('active-nav');
        }
        function openGame(id){ document.getElementById(id).style.display='block'; if(id==='g2048') init2048(); if(id==='pc') initPC(); }
        function closeGame(){ document.querySelectorAll('.game-win').forEach(w=>w.style.display='none'); }

        // --- ФАКТЫ ---
        async function nextFact() {
            const t = document.getElementById('f-text'), i = document.getElementById('f-img');
            t.innerText = "Загрузка...";
            const r = await fetch('https://uselessfacts.jsph.pl/api/v2/facts/random');
            const d = await r.json();
            const tr = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(d.text)}&langpair=en|ru`);
            const td = await tr.json();
            t.innerText = td.responseData.translatedText;
            i.src = `https://picsum.photos/400/300?random=${Math.random()}`;
        }

        // --- ПОИСК ---
        async function wiki(){
            const q=document.getElementById('s-in').value, o=document.getElementById('s-out');
            if(!q) return; document.getElementById('s-res').style.display='block';
            o.innerText = "Ищу...";
            const r = await fetch(`https://ru.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(q)}`);
            const d = await r.json();
            o.innerText = d.extract || "Ничего не найдено";
        }

        // --- ИИ ЧАТ ---
        async function ask(){
            const inp=document.getElementById('ai-in'), a=document.getElementById('chat-area');
            if(!inp.value) return;
            const q = inp.value; inp.value="";
            a.innerHTML += `<div class="m user">${q}</div>`;
            const m = document.createElement('div'); m.className="m ai"; m.innerText="...";
            a.appendChild(m);
            if(q.toLowerCase().includes("дела")) m.innerText = "У меня всё отлично, готов помогать тебе!";
            else {
                const r = await fetch(`https://api.duckduckgo.com/?q=${encodeURIComponent(q)}&format=json&no_html=1`);
                const d = await r.json();
                m.innerText = d.AbstractText || "Интересный вопрос! Я думаю, это связано с наукой или историей. Давай уточним?";
            }
            a.scrollTop = a.scrollHeight;
        }

        // --- ЛОГИКА 2048 (ПОЛНАЯ) ---
        let b2048, score=0;
        function init2048(){
            b2048 = Array(4).fill().map(()=>Array(4).fill(0));
            score = 0; addT(); addT(); draw2048();
        }
        function addT(){
            let empty = [];
            for(let r=0; r<4; r++) for(let c=0; c<4; c++) if(b2048[r][c]===0) empty.push({r,c});
            if(empty.length){
                let {r,c} = empty[Math.floor(Math.random()*empty.length)];
                b2048[r][c] = Math.random() > 0.1 ? 2 : 4;
            }
        }
        function draw2048(){
            const g = document.getElementById('grid'); g.innerHTML="";
            b2048.forEach(row => row.forEach(v => {
                const c = document.createElement('div'); c.className = `cell ${v?'v'+v:''}`;
                c.innerText = v || ""; g.appendChild(c);
            }));
            document.getElementById('sc-val').innerText = score;
        }

        function slide(row) {
            let arr = row.filter(v => v);
            for(let i=0; i<arr.length-1; i++){
                if(arr[i] === arr[i+1]){ arr[i]*=2; score+=arr[i]; arr.splice(i+1, 1); }
            }
            while(arr.length < 4) arr.push(0);
            return arr;
        }

        function move(dir) {
            let old = JSON.stringify(b2048);
            for(let i=0; i<4; i++){
                if(dir==='L') b2048[i] = slide(b2048[i]);
                if(dir==='R') b2048[i] = slide(b2048[i].reverse()).reverse();
                if(dir==='U' || dir==='D'){
                    let col = [b2048[0][i], b2048[1][i], b2048[2][i], b2048[3][i]];
                    if(dir==='U') col = slide(col); else col = slide(col.reverse()).reverse();
                    for(let r=0; r<4; r++) b2048[r][i] = col[r];
                }
            }
            if(old !== JSON.stringify(b2048)) { addT(); draw2048(); }
        }

        let startX, startY;
        document.getElementById('grid').addEventListener('touchstart', e=>{ startX=e.touches[0].clientX; startY=e.touches[0].clientY; });
        document.getElementById('grid').addEventListener('touchend', e=>{
            let dx = e.changedTouches[0].clientX - startX, dy = e.changedTouches[0].clientY - startY;
            if(Math.abs(dx) > Math.abs(dy)){ if(Math.abs(dx)>30) move(dx>0?'R':'L'); }
            else { if(Math.abs(dy)>30) move(dy>0?'D':'U'); }
        });

        // --- КЛИКЕР И ПОЛЕ ЧУДЕС ---
        let bal=0; function tap(){ bal++; document.getElementById('cl-bal').innerText = bal + " 💎"; tg.HapticFeedback.impactOccurred('light'); }
        
        let pcW="ТИГР", pcG=[];
        function initPC(){
            pcG=[]; drawPC();
            const kb = document.getElementById('pc-kb'); kb.innerHTML="";
            "АБВГДЕЖЗИЙКЛМНОПРСТУФХЦЧШЩЪЫЬЭЮЯ".split("").forEach(l=>{
                const b = document.createElement('button'); b.innerText=l; b.style.padding="5px";
                b.onclick=()=>{ pcG.push(l); drawPC(); b.disabled=true; b.style.opacity=0.3; };
                kb.appendChild(b);
            });
        }
        function drawPC(){
            let s=""; for(let l of pcW) s+=pcG.includes(l)?l:"_";
            document.getElementById('pc-word').innerText=s;
            if(!s.includes("_")) alert("Победа!");
        }
    </script>
</body>
</html>
