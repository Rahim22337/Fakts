<!DOCTYPE html>
<html>
<head>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        :root { --bg: #0b0b0b; --accent: #ff0000; --card: #1a1a1a; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: #fff; margin: 0; padding: 15px; }
        
        input { width: 100%; padding: 16px; border-radius: 12px; border: 1px solid #333; background: #222; color: #fff; outline: none; font-size: 16px; box-sizing: border-box; margin-bottom: 10px; }

        .results { background: var(--card); border-radius: 12px; display: none; border: 1px solid #222; overflow: hidden; }
        .item { display: flex; gap: 12px; padding: 10px; border-bottom: 1px solid #222; align-items: center; }
        .item img { width: 45px; height: 65px; border-radius: 5px; object-fit: cover; }

        #player-view { display: none; position: fixed; inset: 0; background: #000; z-index: 2000; flex-direction: column; }
        .p-nav { padding: 10px; display: flex; justify-content: space-between; background: #111; align-items: center; }
        .btn { background: #222; color: #fff; border: 1px solid #444; padding: 8px 15px; border-radius: 8px; font-size: 12px; }
        
        .iframe-wrap { flex: 1; position: relative; background: #000; display: flex; align-items: center; justify-content: center; }
        iframe { width: 100%; height: 100%; border: none; z-index: 10; position: relative; }

        /* Анимация загрузки */
        .loading-text { position: absolute; color: #555; font-size: 14px; text-align: center; }

        .sources { display: flex; gap: 8px; padding: 10px; background: #111; overflow-x: auto; border-top: 1px solid #222; }
        .src-btn { background: #1a1a1a; border: 1px solid #333; color: #888; padding: 10px 14px; border-radius: 8px; white-space: nowrap; font-size: 12px; transition: 0.3s; }
        .src-btn.active { border-color: var(--accent); color: #fff; background: #2a0000; }
    </style>
</head>
<body>

    <input type="text" id="in" placeholder="Поиск фильма..." oninput="search()">
    <div id="res" class="results"></div>

    <div id="player-view">
        <div class="p-nav">
            <span id="p-title" style="font-size: 13px; font-weight: bold; opacity: 0.9;"></span>
            <button class="btn" onclick="closeP()">Закрыть</button>
        </div>
        
        <div class="iframe-wrap" id="v-wrap">
            <div class="loading-text">⌛ Ищем фильм в базе...<br><small>Если долго не грузит, смени источник ниже</small></div>
        </div>

        <div class="sources">
            <div class="src-btn active" onclick="changeSrc(this, 'gg')">Сервер 1 (Лучший)</div>
            <div class="src-btn" onclick="changeSrc(this, 'alloha')">Сервер 2 (Быстрый)</div>
            <div class="src-btn" onclick="changeSrc(this, 'bazon')">Сервер 3 (Запасной)</div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let curId = "";
        const key = '8c8e1a50-6322-4135-8875-5d40a5420d86';

        async function search() {
            const q = document.getElementById('in').value;
            const box = document.getElementById('res');
            if(q.length < 3) { box.style.display = 'none'; return; }

            const r = await fetch(`https://kinopoiskapiunofficial.tech/api/v2.1/films/search-by-keyword?keyword=${encodeURIComponent(q)}`, {
                headers: { 'X-API-KEY': key }
            });
            const d = await r.json();
            
            box.innerHTML = '';
            box.style.display = 'block';
            d.films.slice(0, 5).forEach(f => {
                const div = document.createElement('div');
                div.className = 'item';
                div.onclick = () => openP(f.filmId, f.nameRu || f.nameEn);
                div.innerHTML = `<img src="${f.posterUrlPreview}"><div><b>${f.nameRu || f.nameEn}</b></div>`;
                box.appendChild(div);
            });
        }

        function openP(id, title) {
            curId = id;
            document.getElementById('player-view').style.display = 'flex';
            document.getElementById('p-title').innerText = title;
            changeSrc(document.querySelector('.src-btn'), 'gg');
            tg.HapticFeedback.impactOccurred('medium');
        }

        function changeSrc(btn, type) {
            document.querySelectorAll('.src-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            
            let url = "";
            // Подбираем самые адекватные зеркала без лишнего мусора
            if(type === 'gg') url = `https://www.kinopoisk.gg/film/${curId}/`;
            if(type === 'alloha') url = `https://api.alloha.tv/?token=04941a9a3baabd4643329334000302&kp=${curId}`;
            if(type === 'bazon') url = `https://vidsrc.to/embed/movie/${curId}`; // Оставил для ин.фильмов
            
            const wrap = document.getElementById('v-wrap');
            // Оставляем только самое нужное в sandbox, чтобы не ломать видеопоток
            wrap.innerHTML = `
                <div class="loading-text">⌛ Подключаемся к серверу...</div>
                <iframe src="${url}" allowfullscreen sandbox="allow-forms allow-scripts allow-same-origin allow-presentation"></iframe>
            `;
        }

        function closeP() {
            document.getElementById('player-view').style.display = 'none';
            document.getElementById('v-wrap').innerHTML = '';
        }
    </script>
</body>
</html>
