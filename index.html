<!DOCTYPE html>
<html>
<head>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        :root { --bg: #1c1c1d; --text: #fff; --btn: #007aff; --sec: #2c2c2e; --accent: #f1c40f; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 80px; overflow: hidden; touch-action: none; }
        .tab-content { display: none; padding: 15px; height: calc(100vh - 80px); overflow-y: auto; box-sizing: border-box; }
        .active { display: block; }
        
        .nav { position: fixed; bottom: 0; width: 100%; background: var(--sec); display: flex; height: 70px; border-top: 0.5px solid #333; z-index: 1000; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 10px; opacity: 0.5; color: #fff; }
        .nav-item.active-nav { opacity: 1; color: var(--btn); }
        .nav-item b { font-size: 20px; margin-bottom: 2px; }

        .card { background: var(--sec); border-radius: 16px; padding: 15px; margin-bottom: 12px; }
        button { background: var(--btn); color: #fff; border: none; padding: 12px; border-radius: 10px; font-weight: bold; width: 100%; cursor: pointer; }
        input { width: 100%; padding: 12px; border-radius: 10px; border: none; background: #3d3d42; color: #fff; box-sizing: border-box; }

        /* ИИ ЧАТ СТИЛИ */
        #chat-area { height: 300px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; margin-bottom: 10px; padding: 5px; }
        .m { padding: 12px; border-radius: 15px; max-width: 85%; font-size: 14px; line-height: 1.4; word-wrap: break-word; }
        .ai { background: #3a3a3c; align-self: flex-start; color: #5ac8fa; border-bottom-left-radius: 2px; }
        .user { background: var(--btn); align-self: flex-end; border-bottom-right-radius: 2px; }

        /* ИГРЫ СТИЛИ */
        .grid { width: 280px; height: 280px; background: #bbada0; border-radius: 6px; margin: 10px auto; display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; padding: 10px; box-sizing: border-box; }
        .cell { width: 57px; height: 57px; background: rgba(238, 228, 218, 0.35); border-radius: 3px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 20px; color: #776e65; }
        .v2 { background: #eee4da; } .v4 { background: #ede0c8; } .v8 { background: #f2b179; color: #fff; }
        .v16 { background: #f59563; color: #fff; } .v32 { background: #f67c5f; color: #fff; }
        .pc-key { background: #3d3d42; padding: 10px 0; border-radius: 6px; text-align: center; font-weight: bold; }
        .game-win { display: none; position: fixed; inset: 0; background: var(--bg); z-index: 1100; padding: 15px; overflow-y: auto; }
    </style>
</head>
<body>

    <div id="facts" class="tab-content active">
        <div class="card">
            <div id="img-container" style="width:100%; height:200px; border-radius:12px; background:#333; overflow:hidden; position:relative;">
                <img id="f-img" style="width:100%; height:100%; object-fit:cover; transition: opacity 0.5s;" src="">
            </div>
            <p id="f-text" style="margin-top:15px; font-size:16px; min-height:60px;">Нажми на кнопку, чтобы узнать крутой факт!</p>
        </div>
        <button onclick="nextFact()">🎲 Узнать что-то новое</button>
    </div>

    <div id="search" class="tab-content">
        <input type="text" id="s-in" placeholder="О чем найти факт? (напр. Космос)">
        <button onclick="wiki()" style="margin-top:10px;">🔍 Найти статью</button>
        <div id="s-res" class="card" style="margin-top:15px; display:none;">
            <p id="s-out" style="font-size:14px;"></p>
        </div>
    </div>

    <div id="ai" class="tab-content">
        <div id="chat-area">
            <div class="m ai">Привет! Я твой новый ИИ. Теперь я лучше понимаю вопросы. Спроси меня о чем угодно!</div>
        </div>
        <div style="display:flex; gap:5px;">
            <input type="text" id="ai-in" placeholder="Твое сообщение...">
            <button onclick="ask()" style="width:60px;">🚀</button>
        </div>
    </div>

    <div id="games" class="tab-content">
        <div class="card" onclick="openGame('g2048')">🔢 Игра 2048 (Свайпай)</div>
        <div class="card" onclick="openGame('pc')">🎡 Поле Чудес (Угадай слово)</div>
        <div class="card" onclick="openGame('cl')">💎 Кликер (Магазин и сохранения)</div>
    </div>

    <div id="g2048" class="game-win">
        <button onclick="closeGame()" style="width:60px;">⬅</button>
        <h3 style="text-align:center;">Счет: <span id="sc-val">0</span></h3>
        <div class="grid" id="grid"></div>
    </div>

    <div id="pc" class="game-win">
        <button onclick="closeGame()" style="width:60px;">⬅</button>
        <div style="text-align:center; margin-top:10px;">
            <p id="pc-hint" style="color:var(--accent);"></p>
            <p id="pc-lives" style="font-size:20px;"></p>
            <div id="pc-word" style="font-size:30px; letter-spacing:5px; margin:20px 0; font-family:monospace;"></div>
            <div id="pc-kb" style="display:grid; grid-template-columns:repeat(8,1fr); gap:5px;"></div>
        </div>
    </div>

    <div id="cl" class="game-win">
        <button onclick="closeGame()" style="width:60px;">⬅</button>
        <div style="text-align:center; margin-top:20px;">
            <h1 id="cl-bal">0 💎</h1>
            <div onclick="tap()" id="main-diamond" style="font-size:100px; user-select:none; cursor:pointer;">💎</div>
            <p id="cl-pps">Авто-доход: 0/сек</p>
            <div class="card" style="text-align:left;">
                <button onclick="buy(1)" id="u1-btn" style="margin-bottom:10px;">⛏ Кирка (50 💎)</button>
                <button onclick="buy(2)" id="u2-btn" style="background:#28a745;">🤖 Робот (100 💎)</button>
            </div>
        </div>
    </div>

    <div class="nav">
        <div class="nav-item active-nav" onclick="sw('facts',this)"><b>💡</b>Факты</div>
        <div class="nav-item" onclick="sw('search',this)"><b>🔍</b>Поиск</div>
        <div class="nav-item" onclick="sw('ai',this)"><b>🤖</b>ИИ Чат</div>
        <div class="nav-item" onclick="sw('games',this)"><b>🎮</b>Игры</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp; tg.expand();
        let state = JSON.parse(localStorage.getItem('fData')) || { bal:0, ppc:1, pps:0, u1c:50, u2c:100 };

        function sw(id,el){
            document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active-nav'));
            document.getElementById(id).classList.add('active'); el.classList.add('active-nav');
        }

        // --- УЛУЧШЕННЫЕ ФАКТЫ И КАРТИНКИ ---
        async function nextFact() {
            const t = document.getElementById('f-text'), i = document.getElementById('f-img');
            t.innerText = "🌀 Ищу интересный факт...";
            i.style.opacity = '0.3';
            
            try {
                const fr = await fetch('https://uselessfacts.jsph.pl/api/v2/facts/random');
                const fd = await fr.json();
                
                // Перевод на русский
                const tr = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(fd.text)}&langpair=en|ru`);
                const td = await tr.json();
                const factText = td.responseData.translatedText;
                t.innerText = factText;

                // Умный поиск картинки: берем первые два слова факта для тематики
                const keywords = fd.text.split(' ').slice(0, 3).join(',');
                i.src = `https://source.unsplash.com/featured/?${encodeURIComponent(keywords)}`;
                i.onload = () => i.style.opacity = '1';
                
            } catch(e) { t.innerText = "Упс! Ошибка связи. Попробуй еще раз."; }
        }

        // --- НОВЫЙ ИИ ЧАТ (УМНЫЙ) ---
        async function ask(){
            const inp=document.getElementById('ai-in'), a=document.getElementById('chat-area');
            if(!inp.value) return;
            const q = inp.value; inp.value="";
            a.innerHTML += `<div class="m user">${q}</div>`;
            const m = document.createElement('div'); m.className="m ai"; m.innerText="...";
            a.appendChild(m); a.scrollTop = a.scrollHeight;

            try {
                // Используем DuckDuckGo AI Proxy (через Pollinations для стабильности)
                const r = await fetch(`https://text.pollinations.ai/${encodeURIComponent(q)}?system=Ты дружелюбный помощник в Telegram Mini App. Отвечай коротко и ясно на русском языке.`);
                m.innerText = await r.text();
            } catch(e) { m.innerText = "Я задумался слишком сильно... Спроси что-то другое!"; }
            a.scrollTop = a.scrollHeight;
        }

        // --- ВСЁ ОСТАЛЬНОЕ (ПОИСК, ИГРЫ) ---
        async function wiki(){
            const q=document.getElementById('s-in').value, o=document.getElementById('s-out');
            if(!q) return; document.getElementById('s-res').style.display='block'; o.innerText="Ищу в энциклопедии...";
            const r = await fetch(`https://ru.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(q)}`);
            const d = await r.json();
            o.innerText = d.extract || "Ничего не найдено.";
        }

        function openGame(id){ document.getElementById(id).style.display='block'; if(id==='g2048') init2048(); if(id==='pc') initPC(); if(id==='cl') updCl(); }
        function closeGame(){ document.querySelectorAll('.game-win').forEach(w=>w.style.display='none'); }

        // --- ЛОГИКА 2048 ---
        let b2048, score=0;
        function init2048(){ b2048=Array(4).fill().map(()=>Array(4).fill(0)); score=0; addT(); addT(); draw2048(); }
        function addT(){
            let em=[]; for(let r=0; r<4; r++) for(let c=0; c<4; c++) if(b2048[r][c]===0) em.push({r,c});
            if(em.length){ let {r,c}=em[Math.floor(Math.random()*em.length)]; b2048[r][c]=Math.random()>0.1?2:4; }
        }
        function draw2048(){
            const g=document.getElementById('grid'); g.innerHTML="";
            b2048.forEach(row=>row.forEach(v=>{ const c=document.createElement('div'); c.className=`cell ${v?'v'+v:''}`; c.innerText=v||""; g.appendChild(c); }));
            document.getElementById('sc-val').innerText=score;
        }
        function slide(row){
            let a=row.filter(v=>v); for(let i=0; i<a.length-1; i++) if(a[i]===a[i+1]){ a[i]*=2; score+=a[i]; a.splice(i+1,1); }
            while(a.length<4) a.push(0); return a;
        }
        function move(dir){
            let old=JSON.stringify(b2048);
            for(let i=0; i<4; i++){
                if(dir==='L') b2048[i]=slide(b2048[i]);
                if(dir==='R') b2048[i]=slide(b2048[i].reverse()).reverse();
                if(dir==='U'||dir==='D'){
                    let col=[b2048[0][i],b2048[1][i],b2048[2][i],b2048[3][i]];
                    if(dir==='U') col=slide(col); else col=slide(col.reverse()).reverse();
                    for(let r=0; r<4; r++) b2048[r][i]=col[r];
                }
            }
            if(old!==JSON.stringify(b2048)){ addT(); draw2048(); }
        }
        let sx, sy;
        document.addEventListener('touchstart', e=>{ sx=e.touches[0].clientX; sy=e.touches[0].clientY; }, {passive: false});
        document.addEventListener('touchend', e=>{
            let dx=e.changedTouches[0].clientX-sx, dy=e.changedTouches[0].clientY-sy;
            if(Math.abs(dx)>Math.abs(dy)){ if(Math.abs(dx)>30) move(dx>0?'R':'L'); }
            else{ if(Math.abs(dy)>30) move(dy>0?'D':'U'); }
        }, {passive: false});

        // --- ЛОГИКА ПОЛЕ ЧУДЕС ---
        let pcW, pcG, pcL;
        const pcd=[{w:"ПИРАМИДА",h:"Великое строение в Египте"},{w:"СОЛНЦЕ",h:"Ближайшая к нам звезда"},{w:"БАНАН",h:"Любимый фрукт обезьян"}];
        function initPC(){
            let i=pcd[Math.floor(Math.random()*pcd.length)]; pcW=i.w; pcG=[]; pcL=5;
            document.getElementById('pc-hint').innerText="Подсказка: "+i.h; drawPC();
            const kb=document.getElementById('pc-kb'); kb.innerHTML="";
            "АБВГДЕЖЗИЙКЛМНОПРСТУФХЦЧШЩЪЫЬЭЮЯ".split("").forEach(l=>{
                const b=document.createElement('div'); b.className="pc-key"; b.innerText=l;
                b.onclick=()=>{ if(pcG.includes(l)) return; pcG.push(l); if(!pcW.includes(l)) pcL--; b.style.opacity=0.3; drawPC(); };
                kb.appendChild(b);
            });
        }
        function drawPC(){
            let s=""; for(let l of pcW) s+=pcG.includes(l)?l:"_";
            document.getElementById('pc-word').innerText=s;
            document.getElementById('pc-lives').innerText="❤️".repeat(pcL);
            if(!s.includes("_")){ alert("Победа!"); initPC(); } else if(pcL<=0){ alert("Слово было: "+pcW); initPC(); }
        }

        // --- ЛОГИКА КЛИКЕРА ---
        function updCl(){
            document.getElementById('cl-bal').innerText=Math.floor(state.bal)+" 💎";
            document.getElementById('cl-pps').innerText="Авто-доход: "+state.pps+"/сек";
            document.getElementById('u1-btn').innerText=`⛏ Кирка (${state.u1c} 💎)`;
            document.getElementById('u2-btn').innerText=`🤖 Робот (${state.u2c} 💎)`;
        }
        function tap(){ state.bal+=state.ppc; updCl(); save(); tg.HapticFeedback.impactOccurred('light'); }
        function buy(t){
            if(t===1 && state.bal>=state.u1c){ state.bal-=state.u1c; state.ppc++; state.u1c=Math.floor(state.u1c*1.5); }
            else if(t===2 && state.bal>=state.u2c){ state.bal-=state.u2c; state.pps++; state.u2c=Math.floor(state.u2c*1.5); }
            updCl(); save();
        }
        function save(){ localStorage.setItem('fData', JSON.stringify(state)); }
        setInterval(()=>{ if(state.pps>0){ state.bal+=state.pps; updCl(); save(); } }, 1000);
        
        updCl();
    </script>
</body>
</html>
