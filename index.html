<!DOCTYPE html>
<html>
<head>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        :root { --bg: #0f0f0f; --text: #fff; --btn: #e50914; --sec: #1f1f1f; }
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; }
        
        .search-box { display: flex; gap: 8px; margin-bottom: 20px; }
        input { flex: 1; padding: 12px; border-radius: 8px; border: none; background: var(--sec); color: #fff; outline: none; }
        button { background: var(--btn); color: #fff; border: none; padding: 12px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; }

        .movie-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .movie-card { background: var(--sec); border-radius: 10px; overflow: hidden; transition: 0.3s; }
        .movie-card img { width: 100%; height: 220px; object-fit: cover; background: #333; }
        .movie-info { padding: 10px; font-size: 14px; text-align: center; }

        /* ОКНО ПЛЕЕРА */
        #player-win { display: none; position: fixed; inset: 0; background: #000; z-index: 2000; }
        .close-btn { position: absolute; top: 20px; left: 20px; z-index: 2001; background: rgba(255,255,255,0.2); padding: 10px; border-radius: 50%; width: 40px; height: 40px; border: none; color: #fff; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <div class="search-box">
        <input type="text" id="m-in" placeholder="Название фильма или аниме...">
        <button onclick="searchMovie()">🔍</button>
    </div>

    <div class="movie-grid" id="m-grid">
        </div>

    <div id="player-win">
        <button class="close-btn" onclick="closePlayer()">✕</button>
        <div id="video-container" style="width: 100%; height: 100%;"></div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        async function searchMovie() {
            const query = document.getElementById('m-in').value;
            const grid = document.getElementById('m-grid');
            if(!query) return;

            grid.innerHTML = "⌛ Ищу в базе данных...";

            try {
                // Используем бесплатный API Кинопоиска (неофициальный) для поиска ID и инфы
                // А потом свяжем это с плеером.
                const res = await fetch(`https://kinobox.tv/api/films/search?title=${encodeURIComponent(query)}`);
                const movies = await res.json();

                grid.innerHTML = "";
                movies.forEach(m => {
                    const card = document.createElement('div');
                    card.className = 'movie-card';
                    card.innerHTML = `
                        <img src="${m.posterUrl || 'https://via.placeholder.com/200x300?text=No+Poster'}" onclick="playMovie('${m.id}')">
                        <div class="movie-info">${m.title} (${m.year || '?'})</div>
                    `;
                    grid.appendChild(card);
                });
            } catch(e) {
                grid.innerHTML = "❌ Ошибка поиска. Попробуй другое название.";
            }
        }

        function playMovie(id) {
            const win = document.getElementById('player-win');
            const container = document.getElementById('video-container');
            
            win.style.display = 'block';
            
            // Вставляем универсальный плеер Kinobox
            // Он сам ищет видео по всем пиратским базам (Kodik, HDVB, Bazon и т.д.)
            container.innerHTML = `<iframe src="https://kinobox.tv/embed/kp/${id}" allowfullscreen></iframe>`;
            
            tg.HapticFeedback.impactOccurred('medium');
        }

        function closePlayer() {
            document.getElementById('player-win').style.display = 'none';
            document.getElementById('video-container').innerHTML = ""; // Останавливаем видео
        }
    </script>
</body>
</html>
