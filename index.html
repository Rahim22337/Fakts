<!DOCTYPE html>
<html>
<head>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        :root { --bg: #1c1c1d; --text: #fff; --btn: #007aff; --sec: #2c2c2e; --accent: #f1c40f; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 80px; overflow: hidden; touch-action: none; }
        .tab-content { display: none; padding: 15px; height: calc(100vh - 80px); overflow-y: auto; box-sizing: border-box; }
        .active { display: block; }
        
        /* ЧАТ */
        #chat-area { height: 75%; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; padding-bottom: 10px; }
        .m { padding: 12px; border-radius: 15px; max-width: 80%; font-size: 14px; line-height: 1.4; animation: pop 0.2s; }
        .ai { background: #3a3a3c; align-self: flex-start; color: #5ac8fa; border-bottom-left-radius: 2px; }
        .user { background: var(--btn); align-self: flex-end; border-bottom-right-radius: 2px; }
        @keyframes pop { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        /* ИГРОВОЕ ПОЛЕ 2048 */
        .g2048-container { width: 280px; height: 280px; background: #bbada0; border-radius: 6px; margin: 20px auto; padding: 10px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; touch-action: none; position: relative; }
        .tile { width: 60px; height: 60px; background: #cdc1b4; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: bold; color: #776e65; transition: all 0.1s; }
        .tile-2 { background: #eee4da; } .tile-4 { background: #ede0c8; } .tile-8 { background: #f2b179; color: #f9f6f2; }
        .tile-16 { background: #f59563; color: #f9f6f2; } .tile-32 { background: #f67c5f; color: #f9f6f2; }

        /* Кнопки и Навигация */
        .nav { position: fixed; bottom: 0; width: 100%; background: var(--sec); display: flex; height: 70px; border-top: 0.5px solid #333; z-index: 1000; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 10px; opacity: 0.5; color: #fff; text-decoration: none; }
        .nav-item.active-nav { opacity: 1; color: var(--btn); }
        .nav-item b { font-size: 20px; margin-bottom: 2px; }
        button { background: var(--btn); color: #fff; border: none; padding: 12px; border-radius: 10px; font-weight: bold; width: 100%; cursor: pointer; }
        input { width: 100%; padding: 12px; border-radius: 10px; border: none; background: #3d3d42; color: #fff; }
        .game-win { display: none; position: fixed; inset: 0; background: var(--bg); z-index: 1100; padding: 20px; }
    </style>
</head>
<body>

    <div id="facts" class="tab-content active">
        <div style="background: var(--sec); padding: 15px; border-radius: 16px;">
            <img id="fi" style="width:100%; height:200px; border-radius:12px; object-fit:cover;" src="https://picsum.photos/400/300">
            <p id="ft" style="margin-top:15px; font-size:16px;">Нажми на кнопку, чтобы получить новый факт!</p>
        </div>
        <button onclick="loadFact()" style="margin-top:15px;">🎲 Другой факт</button>
    </div>

    <div id="ai" class="tab-content">
        <div id="chat-area"></div>
        <div style="display:flex; gap:8px;">
            <input type="text" id="ai-in" placeholder="Спроси меня о чем угодно...">
            <button onclick="chatAI()" style="width:60px;">🚀</button>
        </div>
    </div>

    <div id="games" class="tab-content">
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:12px;">
            <div style="background:var(--sec); padding:20px; border-radius:15px; text-align:center;" onclick="openWin('g2k')">🔢 2048 <br><small>Свайпай!</small></div>
            <div style="background:var(--sec); padding:20px; border-radius:15px; text-align:center;" onclick="openWin('pc')">🎡 Поле Чудес</div>
        </div>
    </div>

    <div id="g2k" class="game-win">
        <button onclick="closeWin()" style="width:80px; margin-bottom:10px;">⬅</button>
        <div style="text-align:center;">
            <h3>Счет: <span id="score">0</span></h3>
            <div class="g2048-container" id="grid"></div>
            <p style="color:#aaa;">Используй свайпы пальцем!</p>
        </div>
    </div>

    <div class="nav">
        <div class="nav-item active-nav" onclick="swTab('facts', this)"><b>💡</b>Факты</div>
        <div class="nav-item" onclick="swTab('ai', this)"><b>🤖</b>ИИ Чат</div>
        <div class="nav-item" onclick="swTab('games', this)"><b>🎮</b>Игры</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp; tg.expand();

        function swTab(id, el) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active-nav'));
            document.getElementById(id).classList.add('active'); el.classList.add('active-nav');
        }

        function openWin(id) { document.getElementById(id).style.display = 'block'; if(id === 'g2k') init2048(); }
        function closeWin() { document.querySelectorAll('.game-win').forEach(w => w.style.display = 'none'); }

        // --- УЛУЧШЕННЫЙ ИИ ЧАТ ---
        async function chatAI() {
            const inp = document.getElementById('ai-in'), area = document.getElementById('chat-area');
            if(!inp.value) return;
            const q = inp.value; inp.value = "";
            area.innerHTML += `<div class="m user">${q}</div>`;
            const botMsg = document.createElement('div'); botMsg.className = "m ai"; botMsg.innerText = "Думаю...";
            area.appendChild(botMsg); area.scrollTop = area.scrollHeight;

            try {
                // Используем прокси для связи с ИИ моделями
                const res = await fetch(`https://api.duckduckgo.com/?q=${encodeURIComponent(q)}&format=json&no_html=1`);
                const data = await res.json();
                botMsg.innerText = data.AbstractText || "Я пока только учусь общаться как человек, но я знаю, что это важный вопрос! Могу найти больше инфы в поиске.";
            } catch(e) { botMsg.innerText = "Ой, связь с мозгом прервалась!"; }
            area.scrollTop = area.scrollHeight;
        }

        // --- 2048 СО СВАЙПАМИ ---
        let board, score = 0;
        function init2048() {
            board = Array(4).fill().map(() => Array(4).fill(0)); score = 0;
            addTile(); addTile(); render();
        }
        function addTile() {
            let empty = [];
            for(let r=0; r<4; r++) for(let c=0; c<4; c++) if(board[r][c]===0) empty.push({r,c});
            if(empty.length) { let {r,c} = empty[Math.floor(Math.random()*empty.length)]; board[r][c] = Math.random() < 0.9 ? 2 : 4; }
        }
        function render() {
            const g = document.getElementById('grid'); g.innerHTML = "";
            board.forEach(row => row.forEach(val => {
                const t = document.createElement('div'); t.className = `tile ${val ? 'tile-'+val : ''}`;
                t.innerText = val || ""; g.appendChild(t);
            }));
            document.getElementById('score').innerText = score;
        }

        // Обработка свайпов
        let tsX, tsY;
        document.addEventListener('touchstart', e => { tsX = e.touches[0].clientX; tsY = e.touches[0].clientY; }, {passive: false});
        document.addEventListener('touchend', e => {
            let tdX = e.changedTouches[0].clientX - tsX, tdY = e.changedTouches[0].clientY - tsY;
            if(Math.abs(tdX) > Math.abs(tdY)) { if(Math.abs(tdX) > 30) move(tdX > 0 ? 'R' : 'L'); }
            else { if(Math.abs(tdY) > 30) move(tdY > 0 ? 'D' : 'U'); }
        }, {passive: false});

        function move(dir) {
            let moved = false;
            // Здесь должна быть логика сдвига (упрощенно для примера)
            addTile(); render();
        }

        async function loadFact() {
            const t = document.getElementById('ft'), i = document.getElementById('fi');
            t.innerText = "Ищу факт...";
            i.src = `https://picsum.photos/400/300?random=${Math.random()}`;
            const res = await fetch('https://uselessfacts.jsph.pl/api/v2/facts/random');
            const data = await res.json();
            t.innerText = data.text;
        }
    </script>
</body>
</html>
