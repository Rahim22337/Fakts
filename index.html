<!DOCTYPE html>
<html>
<head>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        :root { --bg: #0b0b0b; --accent: #ff0000; --card: #1a1a1a; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: #fff; margin: 0; padding: 15px; }
        
        /* Поиск */
        .search-area { position: sticky; top: 0; background: var(--bg); z-index: 100; padding-bottom: 10px; }
        input { width: 100%; padding: 16px; border-radius: 12px; border: 1px solid #333; background: #222; color: #fff; outline: none; font-size: 16px; box-sizing: border-box; }

        .results { background: var(--card); border-radius: 12px; margin-top: 10px; display: none; border: 1px solid #222; }
        .item { display: flex; gap: 12px; padding: 10px; border-bottom: 1px solid #222; align-items: center; }
        .item img { width: 45px; height: 65px; border-radius: 5px; object-fit: cover; }
        .item b { font-size: 14px; display: block; }

        /* Плеер */
        #player-view { display: none; position: fixed; inset: 0; background: #000; z-index: 2000; flex-direction: column; }
        .p-nav { padding: 10px; display: flex; gap: 10px; background: #111; align-items: center; }
        .btn { background: #333; color: #fff; border: none; padding: 10px 15px; border-radius: 8px; font-weight: bold; font-size: 12px; }
        
        .iframe-wrap { flex: 1; background: #000; position: relative; }
        /* Магия против рекламы: sandbox */
        iframe { width: 100%; height: 100%; border: none; }

        .sources { display: flex; gap: 8px; padding: 10px; background: #111; overflow-x: auto; border-top: 1px solid #222; }
        .src-btn { background: #222; border: 1px solid #444; color: #ccc; padding: 8px 12px; border-radius: 6px; white-space: nowrap; font-size: 11px; }
        .src-btn.active { border-color: var(--accent); color: #fff; background: #331111; }
    </style>
</head>
<body>

    <div class="search-area">
        <input type="text" id="in" placeholder="Название фильма..." oninput="search()">
    </div>

    <div id="res" class="results"></div>

    <div id="player-view">
        <div class="p-nav">
            <button class="btn" onclick="closeP()">✕ Закрыть</button>
            <span id="p-title" style="font-size: 12px; opacity: 0.8; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;"></span>
        </div>
        
        <div class="iframe-wrap" id="v-wrap"></div>

        <div class="sources">
            <div class="src-btn active" onclick="changeSrc(this, 'vip')">Источник 1 (VIP)</div>
            <div class="src-btn" onclick="changeSrc(this, 'gg')">Источник 2 (GG)</div>
            <div class="src-btn" onclick="changeSrc(this, 'vidsrc')">Источник 3 (Multi)</div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let curId = "";
        const key = '8c8e1a50-6322-4135-8875-5d40a5420d86';

        async function search() {
            const q = document.getElementById('in').value;
            const box = document.getElementById('res');
            if(q.length < 3) { box.style.display = 'none'; return; }

            const r = await fetch(`https://kinopoiskapiunofficial.tech/api/v2.1/films/search-by-keyword?keyword=${encodeURIComponent(q)}`, {
                headers: { 'X-API-KEY': key }
            });
            const d = await r.json();
            
            box.innerHTML = '';
            box.style.display = 'block';
            d.films.slice(0, 5).forEach(f => {
                const div = document.createElement('div');
                div.className = 'item';
                div.onclick = () => openP(f.filmId, f.nameRu || f.nameEn);
                div.innerHTML = `<img src="${f.posterUrlPreview}"><div><b>${f.nameRu || f.nameEn}</b><small>${f.year}</small></div>`;
                box.appendChild(div);
            });
        }

        function openP(id, title) {
            curId = id;
            document.getElementById('player-view').style.display = 'flex';
            document.getElementById('p-title').innerText = title;
            loadIframe(`https://www.kinopoisk.vip/film/${id}/`);
            tg.HapticFeedback.impactOccurred('medium');
        }

        function changeSrc(btn, type) {
            document.querySelectorAll('.src-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            
            let url = "";
            if(type === 'vip') url = `https://www.kinopoisk.vip/film/${curId}/`;
            if(type === 'gg') url = `https://www.kinopoisk.gg/film/${curId}/`;
            if(type === 'vidsrc') url = `https://vidsrc.to/embed/movie/${curId}`;
            
            loadIframe(url);
        }

        function loadIframe(url) {
            const wrap = document.getElementById('v-wrap');
            // sandbox="allow-scripts allow-same-origin" — КЛЮЧЕВОЙ МОМЕНТ. 
            // Он разрешает видео, но ЗАПРЕЩАЕТ открывать новые вкладки (рекламу).
            wrap.innerHTML = `<iframe src="${url}" allowfullscreen sandbox="allow-forms allow-scripts allow-same-origin allow-presentation"></iframe>`;
        }

        function closeP() {
            document.getElementById('player-view').style.display = 'none';
            document.getElementById('v-wrap').innerHTML = '';
        }
    </script>
</body>
</html>
